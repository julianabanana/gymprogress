    const flexibilityRoutine = [
      { name: "Cadera (Butterfly stretch)", time: "1 min" },

      { name: "Isquiotibiales", time: "1 min por lado" },

    const DumbbellIcon = () => (
      <svg className="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6.5 10.5l-3.5 3.5m0 0l2 2m-2-2l-1.5-1.5M17.5 13.5l3.5-3.5m0 0l-2-2m2 2l1.5 1.5M16 8l-6 6M8.5 15.5l1.5 1.5M14 7l1.5 1.5" /></svg>
    );

      <svg className="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>

    );
    const InfoIcon = () => (
      <svg className="w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
    );

      <svg className="w-6 h-6 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>
    );
    const TrashIcon = () => (
      <svg className="w-4 h-4 mr-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
    );

    function App() {
      const [activePhase, setActivePhase] = React.useState(0);
      const [activeDay, setActiveDay] = React.useState(0);

      // Cargar datos guardados previamente de forma segura
      const [completedExercises, setCompletedExercises] = React.useState(() => {
        try {
          return JSON.parse(localStorage.getItem('completedExercises') || '{}');
        } catch (e) {
          return {};
        }
      });

      const [exerciseWeights, setExerciseWeights] = React.useState(() => {
        try {
          return JSON.parse(localStorage.getItem('exerciseWeights') || '{}');
        } catch (e) {
          return {};
        }
      });

      // Guardar en LocalStorage cada vez que cambie de estado
      React.useEffect(() => {
        localStorage.setItem('completedExercises', JSON.stringify(completedExercises));
      }, [completedExercises]);

      React.useEffect(() => {
        localStorage.setItem('exerciseWeights', JSON.stringify(exerciseWeights));
      }, [exerciseWeights]);

      const phase = workoutPlan[activePhase];
      const day = phase.days[activeDay];

      const toggleExercise = (id) => {
        setCompletedExercises(prev => ({
          ...prev,
          [id]: !prev[id]
        }));
      };

      const handleWeightChange = (id, weight) => {
        setExerciseWeights(prev => ({
          ...prev,
          [id]: weight
        }));
      };

      const getIconForType = (type) => {
        switch(type) {
          case 'strength': return <DumbbellIcon />;
          case 'cardio': return <FlameIcon />;
          case 'mobility': case 'bodyweight': return <StretchIcon />;
          default: return <InfoIcon />;
        }
      };

      const resetProgress = () => {
        if (window.confirm("¿Segura de que quieres borrar todos tus ejercicios marcados y los pesos registrados?")) {
          setCompletedExercises({});
          setExerciseWeights({});
          localStorage.removeItem('completedExercises');
          localStorage.removeItem('exerciseWeights');
        }
      };

      const exercisesBySection = day.exercises.reduce((acc, exercise) => {
        if (!acc[exercise.section]) acc[exercise.section] = [];
        acc[exercise.section].push(exercise);
        return acc;
      }, {});

      return (
        <div className="pb-16">
          {/* Header */}
          <header className="bg-indigo-600 text-white p-6 shadow-md mb-6">
            <div className="max-w-3xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
              <div>
                <h1 className="text-2xl font-bold tracking-tight">Mi Diario de Entrenamiento </h1>
                <p className="text-indigo-200 text-sm mt-0.5">Fuerza, recomposición corporal y calistenia en 90 días</p>
              </div>
              <button 
                onClick={resetProgress}
                className="text-xs bg-indigo-700 hover:bg-indigo-800 border border-indigo-500 transition-colors px-3 py-1.5 rounded-lg font-medium flex items-center shadow-inner"
              >
                <TrashIcon /> Reiniciar Progreso
              </button>
            </div>
          </header>

          <main className="max-w-3xl mx-auto px-4">
            
            {}
            <div className="flex gap-2 overflow-x-auto pb-3 mb-4 no-scrollbar">
              {workoutPlan.map((p, idx) => (
                <button
                  key={p.id}
                  onClick={() => { setActivePhase(idx); setActiveDay(0); }}
                  className={`flex-shrink-0 px-4 py-2.5 rounded-full font-semibold text-sm transition-all shadow-sm ${
                    activePhase === idx 
                      ? 'bg-indigo-600 text-white border border-indigo-600 scale-105' 
                      : 'bg-white text-gray-600 hover:bg-indigo-50 border border-gray-200'
                  }`}
                >
                  {p.name} <span className="text-xs font-normal opacity-85 ml-1">({p.weeks})</span>
                </button>
              ))}
            </div>

            {/* Cuadro de Objetivo de Fase */}
            <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-200/80 mb-6 flex items-start gap-3">
              <div className="p-2 bg-indigo-50 rounded-lg text-indigo-600 mt-0.5">
                <InfoIcon />
              </div>
              <div>
                <h2 className="text-sm font-bold uppercase tracking-wider text-gray-400">Objetivo {phase.name}</h2>
                <p className="text-gray-700 text-sm font-medium mt-0.5 leading-relaxed">{phase.goal}</p>
              </div>
            </div>

            {}
            <div className="grid grid-cols-4 sm:grid-cols-7 gap-2 mb-6">
              {phase.days.map((d, idx) => {
                const isSelected = activeDay === idx;
                return (
                  <button
                    key={d.id}
                    onClick={() => setActiveDay(idx)}
                    className={`py-3 flex flex-col items-center justify-center rounded-xl border transition-all ${
                      isSelected
                        ? 'bg-indigo-50/80 border-indigo-500 text-indigo-700 font-bold shadow-sm'
                        : 'bg-white border-gray-200 text-gray-500 hover:bg-gray-50'
                    }`}
                  >
                    <span className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Día</span>
                    <span className="text-xl leading-none mt-0.5">{idx + 1}</span>
                  </button>
                );
              })}
            </div>

            {/* Título de la rutina diaria */}
            <div className="mb-6">
              <h2 className="text-2xl font-extrabold text-gray-900 tracking-tight">
                {day.title}
              </h2>
            </div>

            {}
            <div className="space-y-6">
              {Object.entries(exercisesBySection).map(([section, exercises]) => (
                <div key={section} className="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm">
                  <h3 className="text-xs font-extrabold text-gray-400 uppercase tracking-widest mb-3 border-b pb-1">
                    {section}
                  </h3>
                  <div className="space-y-3.5">
                    {exercises.map((ex) => {
                      const isCompleted = completedExercises[ex.id];
                      return (
                        <div 
                          key={ex.id} 
                          className={`flex flex-col sm:flex-row sm:items-center justify-between p-3.5 rounded-xl border transition-all ${
                            isCompleted ? 'bg-indigo-50/50 border-indigo-200/80' : 'bg-gray-50/30 border-gray-100'
                          }`}
                        >
                          {/* Izquierda: Checkbox y Detalles */}
                          <div className="flex items-center gap-3.5 mb-3 sm:mb-0">
                            <button 
                              onClick={() => toggleExercise(ex.id)}
                              className="focus:outline-none flex-shrink-0"
                            >
                              {isCompleted ? (
                                <svg className="w-7 h-7 text-indigo-600 transition-all scale-105" fill="currentColor" viewBox="0 0 20 20">
                                  <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clipRule="evenodd" />
                                </svg>
                              ) : (
                                <svg className="w-7 h-7 text-gray-300 hover:text-indigo-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">
                                  <circle cx="12" cy="12" r="10" />
                                </svg>
                              )}
                            </button>
                            <div>
                              <p className={`font-bold text-base leading-tight ${isCompleted ? 'text-indigo-950 line-through opacity-70' : 'text-gray-800'}`}>
                                {ex.name}
                              </p>
                              <div className="flex items-center gap-2 mt-1">
                                {getIconForType(ex.type)}
                                <span className="text-xs font-semibold text-gray-500 bg-gray-100 px-2 py-0.5 rounded">
                                  {ex.reps}
                                </span>
                              </div>
                            </div>
                          </div>

                          {/* Derecha: Entrada de Peso (Solo Fuerza) */}
                          {ex.type === 'strength' && (
                            <div className="flex items-center gap-2 pl-10 sm:pl-0 sm:ml-4">
                              <label className="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Tu Peso:</label>
                              <div className="relative">
                                <input
                                  type="number"
                                  placeholder="--"
                                  value={exerciseWeights[ex.id] || ''}
                                  onChange={(e) => handleWeightChange(ex.id, e.target.value)}
                                  className="w-16 px-2 py-1.5 bg-white border border-gray-200 rounded-lg text-xs text-center font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                                />
                                <span className="absolute right-1 top-1/2 -translate-y-1/2 text-[9px] text-gray-400 font-bold pointer-events-none">kg</span>
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>

            {}
            {day.title.toLowerCase().indexOf('descanso total') === -1 && (
              <div className="bg-teal-50/60 border border-teal-100/80 rounded-2xl p-5 mt-8 shadow-sm">
                <div className="flex items-center gap-2 mb-3 border-b border-teal-100 pb-2">
                  <StretchIcon />
                  <h2 className="text-base font-bold text-teal-900">Flexibilidad Diaria</h2>
                </div>
                <p className="text-xs text-teal-800 mb-4 leading-relaxed">
                  Realiza este bloque al finalizar tu entrenamiento. Te tomará solo 10 minutos y multiplicará tu rango de movimiento.
                </p>
                <div className="grid sm:grid-cols-2 gap-2.5">
                  {flexibilityRoutine.map((stretch, idx) => (
                    <div key={idx} className="flex justify-between items-center bg-white p-3 rounded-xl border border-teal-50 shadow-sm">
                      <span className="text-xs font-semibold text-gray-700">{stretch.name}</span>
                      <span className="text-[10px] font-bold text-teal-700 bg-teal-50 px-2.5 py-1 rounded-full">{stretch.time}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Progresión Esperada Box */}
            <div className="bg-yellow-50/40 border border-yellow-100 rounded-2xl p-5 mt-6 shadow-sm flex items-start gap-3">
              <TrophyIcon />
              <div>
                <h3 className="text-sm font-bold text-yellow-800 uppercase tracking-wider">Tu Reto de 90 Días</h3>
                <p className="text-xs text-yellow-900/80 mt-1 leading-relaxed">
                  Con constancia lograrás: pérdida de 6-12 kg, mejoras drásticas en tu resistencia cardiovascular (trote continuo de 5-10 km), fuerza superior en glúteos/piernas y un core capaz de realizar dominadas asistidas sumamente sólidas. ¡Ve por ello!
                </p>
              </div>
            </div>

          </main>
        </div>
      );
    }

    // Renderizar la app en el div 'root'
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
